name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write       # needed for attest-build-provenance OIDC
  attestations: write   # needed to write attestations

jobs:
  setup:
    name: Setup (SOURCE_DATE_EPOCH + source SBOM)
    runs-on: ubuntu-24.04
    outputs:
      source_date_epoch: ${{ steps.sde.outputs.value }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - id: sde
        run: echo "value=$(git log -1 --format=%ct)" >> "$GITHUB_OUTPUT"
      - name: Install syft
        run: curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
      - name: Generate source SBOM
        run: syft scan dir:. -o spdx-json=scaffold-source.spdx.json
      - name: Record runner metadata
        run: |
          {
            echo "GitHub Runner Image: $ImageOS $ImageVersion"
            echo "Runner image SBOMs: https://github.com/actions/runner-images/releases"
            echo "Git commit: $(git rev-parse HEAD)"
            echo "SOURCE_DATE_EPOCH: ${{ steps.sde.outputs.value }}"
          } > runner-info.txt
      - name: Upload source SBOM
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: scaffold-source-sbom
          path: |
            scaffold-source.spdx.json
            runner-info.txt

  nix:
    name: Check (Nix)
    runs-on: ubuntu-24.04
    needs: setup
    env:
      SOURCE_DATE_EPOCH: ${{ needs.setup.outputs.source_date_epoch }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: cachix/install-nix-action@96951a368ba55167b55f1c916f7d416bac6505fe  # v31.10.3
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable
      - uses: cachix/cachix-action@1eb2ef646ac0255473d23a5907ad7b04ce94065c  # v17
        with:
          name: scaffold
        continue-on-error: true
      - run: nix develop --command just check
      - run: nix build
      - run: ./result/bin/csv2json | grep -q csv

  format-check:
    name: Format check
    runs-on: ubuntu-24.04
    container: debian@sha256:26f98ccd92fd0a44d6928ce8ff8f4921b4d2f535bfa07555ee5d18f61429cf0c  # debian:trixie-slim
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Install clang-format + just
        run: apt-get update && apt-get install -y --no-install-recommends clang-format just
      - name: Run format-check
        run: just format-check

  lint:
    name: Lint
    runs-on: ubuntu-24.04
    container: debian@sha256:26f98ccd92fd0a44d6928ce8ff8f4921b4d2f535bfa07555ee5d18f61429cf0c  # debian:trixie-slim
    needs: setup
    env:
      SOURCE_DATE_EPOCH: ${{ needs.setup.outputs.source_date_epoch }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Install toolchain
        run: apt-get update && apt-get install -y --no-install-recommends g++ cmake ninja-build mold clang-tidy just
      - name: Run lint
        run: just lint

  clang-build:
    name: Clang build + test
    runs-on: ubuntu-24.04
    container: debian@sha256:26f98ccd92fd0a44d6928ce8ff8f4921b4d2f535bfa07555ee5d18f61429cf0c  # debian:trixie-slim
    needs: setup
    env:
      SOURCE_DATE_EPOCH: ${{ needs.setup.outputs.source_date_epoch }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Install toolchain
        run: apt-get update && apt-get install -y --no-install-recommends clang libstdc++-14-dev cmake ninja-build mold ccache just
      - name: Build + test with clang
        run: just test clang-debug

  docs:
    name: Docs
    runs-on: ubuntu-24.04
    container: debian@sha256:26f98ccd92fd0a44d6928ce8ff8f4921b4d2f535bfa07555ee5d18f61429cf0c  # debian:trixie-slim
    needs: setup
    env:
      SOURCE_DATE_EPOCH: ${{ needs.setup.outputs.source_date_epoch }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Install toolchain
        run: |
          apt-get update && apt-get install -y --no-install-recommends \
            doxygen graphviz \
            texlive-latex-base texlive-latex-recommended texlive-latex-extra \
            texlive-fonts-recommended texlive-plain-generic \
            just make
      - name: Run docs
        run: just docs
      - name: Upload docs
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: scaffold-docs
          path: |
            build/docs/html
            build/docs/latex/refman.pdf

  deps:
    name: Deps
    runs-on: ubuntu-24.04
    container: debian@sha256:26f98ccd92fd0a44d6928ce8ff8f4921b4d2f535bfa07555ee5d18f61429cf0c  # debian:trixie-slim
    needs: setup
    env:
      SOURCE_DATE_EPOCH: ${{ needs.setup.outputs.source_date_epoch }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Install toolchain
        run: apt-get update && apt-get install -y --no-install-recommends g++ cmake ninja-build mold graphviz just
      - name: Run deps
        run: just deps
      - name: Upload deps graph
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: scaffold-deps
          path: build/deps.svg

  coverage:
    name: Coverage
    runs-on: ubuntu-24.04
    container: debian@sha256:26f98ccd92fd0a44d6928ce8ff8f4921b4d2f535bfa07555ee5d18f61429cf0c  # debian:trixie-slim
    needs: setup
    env:
      SOURCE_DATE_EPOCH: ${{ needs.setup.outputs.source_date_epoch }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Install toolchain
        run: apt-get update && apt-get install -y --no-install-recommends g++ cmake ninja-build mold lcov just
      - name: Run coverage
        run: just coverage
      - name: Upload coverage
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: scaffold-coverage
          path: |
            build/coverage/coverage
            build/coverage/coverage.info

  static-binaries:
    name: Static Binaries (x86_64)
    runs-on: ubuntu-24.04
    container: alpine@sha256:853db5e6f507c07b2aaf5c68cde6a86b636a073515906dd176af24108f940ebc  # alpine:edge
    needs: setup
    env:
      SOURCE_DATE_EPOCH: ${{ needs.setup.outputs.source_date_epoch }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Install toolchain
        run: apk add --no-cache g++ cmake samurai mold ccache
      - name: Build static
        run: |
          cmake --preset static
          cmake --build --preset static
      - name: Strip + rename
        run: |
          mkdir -p static-out
          strip build/static/bin/csv2json/csv2json -o static-out/csv2json-x86_64
          strip build/static/bin/json2csv/json2csv -o static-out/json2csv-x86_64
          ls -lh static-out/
      - name: Install syft
        run: |
          apk add --no-cache curl ca-certificates
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
      - name: Generate static binary SBOMs
        run: |
          syft scan file:static-out/csv2json-x86_64 -o spdx-json=static-out/csv2json-x86_64.spdx.json
          syft scan file:static-out/json2csv-x86_64 -o spdx-json=static-out/json2csv-x86_64.spdx.json
      - name: Generate build provenance attestation
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-path: |
            static-out/csv2json-x86_64
            static-out/json2csv-x86_64
      - name: Upload csv2json
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: scaffold-csv2json-static-x86_64
          path: |
            static-out/csv2json-x86_64
            static-out/csv2json-x86_64.spdx.json
      - name: Upload json2csv
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: scaffold-json2csv-static-x86_64
          path: |
            static-out/json2csv-x86_64
            static-out/json2csv-x86_64.spdx.json

  static-binaries-smoke-test:
    name: Static Binary Smoke Test (${{ matrix.target }})
    needs: static-binaries
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - target: alpine
            container: alpine@sha256:853db5e6f507c07b2aaf5c68cde6a86b636a073515906dd176af24108f940ebc  # alpine:edge
          - target: debian
            container: debian@sha256:26f98ccd92fd0a44d6928ce8ff8f4921b4d2f535bfa07555ee5d18f61429cf0c  # debian:trixie-slim
          - target: fedora
            container: registry.fedoraproject.org/fedora@sha256:3a63490f02a445d6d842c110f5255d148dcdc70634c21ebf4693700c5578d3ea  # fedora:latest
          - target: arch
            container: archlinux@sha256:237637c52069930ed7fc76c76f04b6b6b9cf82c5222ae002b7932df983cb69c1  # archlinux:latest
    container: ${{ matrix.container }}
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: scaffold-csv2json-static-x86_64
          path: /tmp
      - name: Run static binary
        run: |
          chmod +x /tmp/csv2json-x86_64
          actual=$(/tmp/csv2json-x86_64)
          expected=$(printf 'csv\njson')
          test "$actual" = "$expected"

  static-binaries-busybox-test:
    name: Static Binary Smoke Test (busybox)
    needs: static-binaries
    runs-on: ubuntu-24.04
    # busybox can't host GitHub Actions (no glibc/libdl), so test via `docker run`
    # from the Ubuntu runner instead of using container:.
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: scaffold-csv2json-static-x86_64
          path: /tmp
      - name: Run in busybox
        run: |
          chmod +x /tmp/csv2json-x86_64
          actual=$(docker run --rm -v /tmp/csv2json-x86_64:/t:ro busybox@sha256:1487d0af5f52b4ba31c7e465126ee2123fe3f2305d638e7827681e7cf6c83d5e /t)  # busybox:latest
          expected=$(printf 'csv\njson')
          test "$actual" = "$expected"

  test:
    name: Test (${{ matrix.distro }}, ${{ matrix.profile }})
    runs-on: ubuntu-24.04
    needs: setup
    env:
      SOURCE_DATE_EPOCH: ${{ needs.setup.outputs.source_date_epoch }}
    strategy:
      fail-fast: false
      matrix:
        distro: [trixie, fedora, alpine, arch]
        profile: [debug, release, asan, tsan]
        include:
          - distro: trixie
            container: debian@sha256:26f98ccd92fd0a44d6928ce8ff8f4921b4d2f535bfa07555ee5d18f61429cf0c  # debian:trixie-slim
          - distro: fedora
            container: registry.fedoraproject.org/fedora@sha256:3a63490f02a445d6d842c110f5255d148dcdc70634c21ebf4693700c5578d3ea  # fedora:latest
          - distro: alpine
            container: alpine@sha256:853db5e6f507c07b2aaf5c68cde6a86b636a073515906dd176af24108f940ebc  # alpine:edge
          - distro: arch
            container: archlinux@sha256:237637c52069930ed7fc76c76f04b6b6b9cf82c5222ae002b7932df983cb69c1  # archlinux:latest
    container: ${{ matrix.container }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install toolchain (Debian)
        if: matrix.distro == 'trixie'
        run: apt-get update && apt-get install -y --no-install-recommends g++ cmake ninja-build mold ccache just

      - name: Install toolchain (Fedora)
        if: matrix.distro == 'fedora'
        run: dnf install -y --setopt=install_weak_deps=False gcc-c++ cmake ninja-build mold ccache libasan libtsan libubsan just

      - name: Install toolchain (Alpine)
        if: matrix.distro == 'alpine'
        run: apk add --no-cache g++ cmake samurai mold ccache just

      - name: Install toolchain (Arch)
        if: matrix.distro == 'arch'
        run: pacman -Syu --noconfirm --needed gcc cmake ninja mold ccache just

      - name: Test
        run: just test ${{ matrix.profile }}

  package:
    name: Package (${{ matrix.distro }}, ${{ matrix.profile }})
    runs-on: ubuntu-24.04
    needs: setup
    env:
      SOURCE_DATE_EPOCH: ${{ needs.setup.outputs.source_date_epoch }}
    strategy:
      fail-fast: false
      matrix:
        distro: [trixie, fedora, alpine, arch]
        profile: [release, debug, asan, tsan]
        include:
          - distro: trixie
            container: debian@sha256:26f98ccd92fd0a44d6928ce8ff8f4921b4d2f535bfa07555ee5d18f61429cf0c  # debian:trixie-slim
            generators: "TGZ;DEB"
            use_makepkg: false
            use_abuild: false
          - distro: fedora
            container: registry.fedoraproject.org/fedora@sha256:3a63490f02a445d6d842c110f5255d148dcdc70634c21ebf4693700c5578d3ea  # fedora:latest
            generators: "TGZ;RPM"
            use_makepkg: false
            use_abuild: false
          - distro: alpine
            container: alpine@sha256:853db5e6f507c07b2aaf5c68cde6a86b636a073515906dd176af24108f940ebc  # alpine:edge
            generators: "TGZ"
            use_makepkg: false
            use_abuild: true
          - distro: arch
            container: archlinux@sha256:237637c52069930ed7fc76c76f04b6b6b9cf82c5222ae002b7932df983cb69c1  # archlinux:latest
            generators: "TGZ"
            use_makepkg: true
            use_abuild: false
    container: ${{ matrix.container }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install build tools (Debian)
        if: matrix.distro == 'trixie'
        run: apt-get update && apt-get install -y --no-install-recommends g++ cmake ninja-build mold ccache

      - name: Install build tools (Fedora)
        if: matrix.distro == 'fedora'
        run: dnf install -y --setopt=install_weak_deps=False gcc-c++ cmake ninja-build mold ccache rpm-build libasan libtsan libubsan

      - name: Install build tools (Alpine)
        if: matrix.distro == 'alpine'
        run: |
          apk add --no-cache g++ cmake samurai mold ccache
          if [ "${{ matrix.use_abuild }}" = "true" ]; then
            apk add --no-cache alpine-sdk sudo
          fi

      - name: Install build tools (Arch)
        if: matrix.distro == 'arch'
        run: pacman -Syu --noconfirm --needed gcc cmake ninja mold ccache fakeroot

      - name: Install syft
        run: |
          # Ensure curl + CA certs are available (slim containers may lack them)
          (command -v apt-get >/dev/null && apt-get install -y --no-install-recommends curl ca-certificates) || \
          (command -v apk >/dev/null && apk add --no-cache curl ca-certificates) || true
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Build-env SBOM
        run: |
          mkdir -p sboms
          # Exclude GitHub Actions runner host-mounts (/__w, /__e, /__t tool cache,
          # /github, /home/runner) so we only inventory the build container's
          # installed toolchain, not the runner's preinstalled Go/Node/Python.
          syft scan dir:/ \
            --exclude './__w/**' --exclude './__e/**' --exclude './__t/**' \
            --exclude './github/**' --exclude './home/runner/**' --exclude './__act/**' \
            -o spdx-json=sboms/buildenv-${{ matrix.distro }}-${{ matrix.profile }}.spdx.json

      - name: Build + Package (CPack)
        run: |
          cmake --preset ${{ matrix.profile }}
          cmake --build --preset ${{ matrix.profile }}
          cd build/${{ matrix.profile }} && cpack -G "${{ matrix.generators }}"

      - name: Build + Package (makepkg)
        if: matrix.use_makepkg == true
        run: |
          useradd -m builder
          chown -R builder:builder .
          su builder -c "SCAFFOLD_PROFILE=${{ matrix.profile }} makepkg -f"

      - name: Build + Package (abuild)
        if: matrix.use_abuild == true
        run: |
          adduser -D builder
          addgroup builder abuild
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          chown -R builder:builder .
          su builder -c "
            abuild-keygen -a -n &&
            sudo cp /home/builder/.abuild/*.rsa.pub /etc/apk/keys/ &&
            SCAFFOLD_PROFILE=${{ matrix.profile }} abuild -F
          "
          find /home/builder/packages -name "*.apk" -exec cp {} . \;

      - name: Generate per-package SBOMs
        run: |
          for pkg in build/${{ matrix.profile }}/scaffold-*.deb \
                     build/${{ matrix.profile }}/scaffold-*.rpm \
                     build/${{ matrix.profile }}/scaffold-*.tar.gz \
                     ./*.apk \
                     ./*.pkg.tar.zst; do
            if [ -f "$pkg" ]; then
              syft scan "file:$pkg" -o spdx-json="sboms/$(basename "$pkg").spdx.json"
              echo "Generated SBOM for $(basename "$pkg")"
            fi
          done
          ls -la sboms/

      - name: Generate build provenance attestation
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-path: |
            build/${{ matrix.profile }}/scaffold-*.deb
            build/${{ matrix.profile }}/scaffold-*.rpm
            build/${{ matrix.profile }}/scaffold-*.tar.gz
            ./*.apk
            ./*.pkg.tar.zst

      - name: Upload SBOMs
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: scaffold-${{ matrix.distro }}-${{ matrix.profile }}-sboms
          path: sboms/

      - name: Upload TGZ
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: scaffold-${{ matrix.distro }}-${{ matrix.profile }}-tgz
          path: build/${{ matrix.profile }}/scaffold-*.tar.gz

      - name: Upload DEB
        if: matrix.distro == 'trixie'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: scaffold-${{ matrix.distro }}-${{ matrix.profile }}-deb
          path: build/${{ matrix.profile }}/scaffold-*.deb

      - name: Upload RPM
        if: matrix.distro == 'fedora'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: scaffold-${{ matrix.distro }}-${{ matrix.profile }}-rpm
          path: build/${{ matrix.profile }}/scaffold-*.rpm

      - name: Upload pkg.tar.zst
        if: matrix.use_makepkg == true
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: scaffold-${{ matrix.distro }}-${{ matrix.profile }}-pkg
          path: "*.pkg.tar.zst"

      - name: Upload APK
        if: matrix.use_abuild == true
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: scaffold-${{ matrix.distro }}-${{ matrix.profile }}-apk
          path: "*.apk"

  install-test:
    name: Install Test (${{ matrix.distro }}, ${{ matrix.format }})
    needs: [setup, package]
    runs-on: ubuntu-24.04
    env:
      SOURCE_DATE_EPOCH: ${{ needs.setup.outputs.source_date_epoch }}
    strategy:
      matrix:
        include:
          # Debian — DEB + TGZ
          - distro: trixie
            container: debian@sha256:26f98ccd92fd0a44d6928ce8ff8f4921b4d2f535bfa07555ee5d18f61429cf0c  # debian:trixie-slim
            format: deb
            pkg_glob: "*.deb"
          - distro: trixie
            container: debian@sha256:26f98ccd92fd0a44d6928ce8ff8f4921b4d2f535bfa07555ee5d18f61429cf0c  # debian:trixie-slim
            format: tgz
            pkg_glob: "*.tar.gz"
          # Fedora — RPM + TGZ
          - distro: fedora
            container: registry.fedoraproject.org/fedora@sha256:3a63490f02a445d6d842c110f5255d148dcdc70634c21ebf4693700c5578d3ea  # fedora:latest
            format: rpm
            pkg_glob: "*.rpm"
          - distro: fedora
            container: registry.fedoraproject.org/fedora@sha256:3a63490f02a445d6d842c110f5255d148dcdc70634c21ebf4693700c5578d3ea  # fedora:latest
            format: tgz
            pkg_glob: "*.tar.gz"
          # Alpine — APK + TGZ
          - distro: alpine
            container: alpine@sha256:853db5e6f507c07b2aaf5c68cde6a86b636a073515906dd176af24108f940ebc  # alpine:edge
            format: apk
            pkg_glob: "*.apk"
          - distro: alpine
            container: alpine@sha256:853db5e6f507c07b2aaf5c68cde6a86b636a073515906dd176af24108f940ebc  # alpine:edge
            format: tgz
            pkg_glob: "*.tar.gz"
          # Arch — pkg.tar.zst + TGZ
          - distro: arch
            container: archlinux@sha256:237637c52069930ed7fc76c76f04b6b6b9cf82c5222ae002b7932df983cb69c1  # archlinux:latest
            format: pkg
            pkg_glob: "*.pkg.tar.zst"
          - distro: arch
            container: archlinux@sha256:237637c52069930ed7fc76c76f04b6b6b9cf82c5222ae002b7932df983cb69c1  # archlinux:latest
            format: tgz
            pkg_glob: "*.tar.gz"
    container: ${{ matrix.container }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Download package
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: scaffold-${{ matrix.distro }}-release-${{ matrix.format }}
          path: /tmp/pkg

      - name: Install package (DEB)
        if: matrix.format == 'deb'
        run: |
          apt-get update -qq
          apt-get install -y /tmp/pkg/${{ matrix.pkg_glob }}

      - name: Install package (RPM)
        if: matrix.format == 'rpm'
        run: dnf install -y /tmp/pkg/${{ matrix.pkg_glob }}

      - name: Install package (pkg.tar.zst)
        if: matrix.format == 'pkg'
        run: pacman -U --noconfirm /tmp/pkg/${{ matrix.pkg_glob }}

      - name: Install package (APK)
        if: matrix.format == 'apk'
        run: apk add --no-cache --allow-untrusted /tmp/pkg/${{ matrix.pkg_glob }}

      - name: Install package (TGZ)
        if: matrix.format == 'tgz'
        run: |
          tar xzf /tmp/pkg/${{ matrix.pkg_glob }} -C /usr --strip-components=1

      - name: Install runtime deps (Alpine TGZ only)
        if: matrix.distro == 'alpine' && matrix.format == 'tgz'
        run: apk add --no-cache libstdc++

      - name: Test binary
        run: |
          actual=$(csv2json)
          expected=$(printf 'csv\njson')
          test "$actual" = "$expected"

      - name: Install build tools (Debian)
        if: matrix.distro == 'trixie'
        run: apt-get update && apt-get install -y --no-install-recommends g++ cmake ninja-build

      - name: Install build tools (Fedora)
        if: matrix.distro == 'fedora'
        run: dnf install -y --setopt=install_weak_deps=False gcc-c++ cmake ninja-build

      - name: Install build tools (Alpine)
        if: matrix.distro == 'alpine'
        run: apk add --no-cache g++ cmake samurai

      - name: Install build tools (Arch)
        if: matrix.distro == 'arch'
        run: pacman -Sy --noconfirm --needed gcc cmake ninja

      - name: Test library (find_package)
        run: |
          cmake -S ci/install-test -B /tmp/consumer-build -G Ninja
          cmake --build /tmp/consumer-build
          actual=$(/tmp/consumer-build/app)
          expected=$(printf '0.1.0\ncsv\njson')
          test "$actual" = "$expected"

  reproducibility:
    name: Reproducibility (trixie, release)
    runs-on: ubuntu-24.04
    container: debian@sha256:26f98ccd92fd0a44d6928ce8ff8f4921b4d2f535bfa07555ee5d18f61429cf0c  # debian:trixie-slim
    needs: setup
    env:
      SOURCE_DATE_EPOCH: ${{ needs.setup.outputs.source_date_epoch }}
      CPACK_GENERATORS: "TGZ;DEB"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install toolchain + diffoscope
        run: |
          apt-get update && apt-get install -y --no-install-recommends \
            g++ cmake ninja-build mold dpkg-dev diffoscope-minimal bash tzdata
          # tzdata lets build B's TZ=Asia/Tokyo actually take effect;
          # C.UTF-8 is built into glibc so no locale-gen is needed.

      - name: Run double-build verification
        run: bash scripts/verify-reproducibility.sh /tmp/scaffold-repro

      - name: Upload diffoscope report (on failure)
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: reproducibility-diffoscope-report
          path: /tmp/scaffold-repro/report/
          if-no-files-found: ignore

      - name: Upload sha256 sums
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: reproducibility-sums
          path: |
            /tmp/scaffold-repro/a.sums
            /tmp/scaffold-repro/b.sums
          if-no-files-found: ignore

  cve-scan:
    name: CVE Scan
    needs: [setup, package, static-binaries]
    runs-on: ubuntu-24.04
    steps:
      - name: Download all SBOMs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          path: /tmp/artifacts
      - name: Install grype
        run: curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
      - name: Scan SBOMs
        run: |
          mkdir -p cve-reports
          fail=0
          # Find all .spdx.json files across downloaded artifacts
          for sbom in $(find /tmp/artifacts -name "*.spdx.json"); do
            name=$(basename "$sbom" .spdx.json)
            echo "=== Scanning $name ==="
            # Write JSON report (always)
            grype sbom:"$sbom" -o json > "cve-reports/$name.cve.json" 2>/dev/null || true
            # Buildenv SBOMs describe the build toolchain, not shipped artifacts —
            # scan for visibility but don't gate CI on findings (consumers aren't
            # exposed to buildenv vulns).
            if [[ "$name" == buildenv-* ]]; then
              grype sbom:"$sbom" -o table || true
              continue
            fi
            # Product SBOMs (source, packages, static binaries): fail on critical
            if ! grype sbom:"$sbom" --fail-on critical -o table; then
              echo "FAIL: $name has critical CVEs"
              fail=1
            fi
          done
          # Collect summary
          echo "=== Summary ==="
          ls -la cve-reports/
          exit $fail
      - name: Upload CVE reports
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: scaffold-cve-reports
          path: cve-reports/

  release:
    name: Release
    # Only run on tag pushes (v*)
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [package, static-binaries, install-test, static-binaries-smoke-test, static-binaries-busybox-test, cve-scan]
    runs-on: ubuntu-24.04
    permissions:
      contents: write  # create releases
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          path: /tmp/artifacts
      - name: Flatten + checksum
        run: |
          mkdir -p release-files
          # Flatten nested artifact structure into one directory
          find /tmp/artifacts -type f -exec cp {} release-files/ \;
          cd release-files
          sha256sum * > SHA256SUMS
          ls -lh
      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe  # v2.6.1
        with:
          files: release-files/*
          generate_release_notes: true
          fail_on_unmatched_files: true
